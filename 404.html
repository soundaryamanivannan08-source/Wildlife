<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page not found on WildJourneys.">
    <title>404 Not Found | WildJourneys</title>
    <link rel="stylesheet" href="css/index.css">
    <style>
        .error-section {
            padding: 120px 20px;
            text-align: center;
            background-color: var(--bg-dark);
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .error-code {
            font-size: 8rem;
            font-family: var(--font-heading);
            color: var(--primary);
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 0 10px 30px rgba(229, 169, 60, 0.2);
        }
        .error-message {
            font-size: 2.5rem;
            color: var(--text-white);
            margin-bottom: 20px;
            font-family: var(--font-heading);
        }
        .error-description {
            color: var(--text-muted);
            max-width: 500px;
            margin-bottom: 40px;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .error-icon {
            width: 80px;
            height: 80px;
            stroke: var(--primary);
            stroke-width: 1.5;
            fill: none;
            margin-bottom: 20px;
            opacity: 0.8;
        }
    </style>
</head>
<body>


    <!-- 404 Section -->
    <section class="error-section">
        
        <div class="error-code">404</div>
        <h1 class="error-message">You've Wandered Off the Trail</h1>
        <p class="error-description">The savanna is vast, and it seems you've lost your way. The page you are looking for has migrated, been removed, or never existed in this territory.</p>
        <div style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;">
            <a href="javascript:void(0)" onclick="if(document.referrer) { window.location.href = document.referrer; } else { history.back(); }" class="btn-primary" style="display: inline-flex; width: auto; padding: 16px 32px; background-color: transparent; border: 1px solid var(--primary); color: var(--primary);">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                <span>Go Back</span>
            </a>
            <a href="index.html" class="btn-primary" style="display: inline-flex; width: auto; padding: 16px 32px;">
                <span>Back to Home</span>
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 8px;">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </a>
        </div>
    </section>



    <script src="js/script.js"></script>
</body>
</html>
